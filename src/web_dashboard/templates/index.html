<!-- src/web_dashboard/templates/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart City Surveillance</title>

  <!-- Bootstrap CSS (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />

  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap">

  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Roboto', sans-serif;
    }
    .navbar-brand {
      font-weight: 600;
      font-size: 1.5rem;
    }
    .anomaly-list {
      margin-top: 40px;
    }
    .list-group-item {
      font-size: 1rem;
      background: #ffffff;
    }
    .timestamp {
      font-size: 0.85rem;
      color: #6c757d;
    }
  </style>

  <!-- Auto-refresh the page every 10 seconds -->
  <script>
    setTimeout(function () {
      location.reload();
    }, 10000); // Refresh every 10 seconds
  </script>
</head>
<body>

  <!-- =======================
       1. NAVIGATION BAR
       ======================= -->
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Smart City Surveillance</a>
    </div>
  </nav>

  <!-- =======================
       2. MAIN CONTAINER
       ======================= -->
  <div class="container anomaly-list">
    <div class="row">
      <div class="col-12">
        <h1 class="mt-4">Anomaly Alerts</h1>
        <hr />

        <!-- If anomalies exist, display them -->
        {% if anomalies %}
          <ul class="list-group">
            {% for item in anomalies %}
              <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                  <strong>{{ item.name }}</strong> <br>
                  <span class="timestamp">Detected: {{ item.timestamp }}</span>
                </div>
                <span class="badge bg-danger">ALERT</span>
              </li>
            {% endfor %}
          </ul>
        {% else %}
          <div class="alert alert-success mt-4" role="alert">
            No anomalies reported at this time.
          </div>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- =======================
       3. BOOTSTRAP JS
       ======================= -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
